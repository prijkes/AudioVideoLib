name: Publish docs

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docs-publish
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-publish:
    name: Build DocFX site and publish to prijkes/audiovideolib.github.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build library (populates XML docs next to the DLL)
        run: dotnet build AudioVideoLib/AudioVideoLib.csproj -c Release

      - name: DocFX metadata + build
        run: docfx docfx.json

      - name: Copy CNAME and .nojekyll into _site
        run: |
          # Prevent GitHub Pages from running Jekyll over the DocFX output
          # (Jekyll would hide files/folders starting with "_").
          touch _site/.nojekyll
          # If the target repo needs a CNAME, drop it in _site/ before publish:
          # echo "docs.example.com" > _site/CNAME

      - name: Publish to audiovideolib.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: prijkes/audiovideolib.github.io
          publish_branch: main
          publish_dir: ./_site
          cname: ""
          commit_message: "docs: publish ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          force_orphan: true
